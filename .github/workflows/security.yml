name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run weekly to catch newly disclosed CVEs
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python SAST ────────────────────────────────────────────────────────────
  bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install bandit
        run: pip install bandit[toml]==1.8.3

      - name: Run bandit
        run: bandit -r app/ -c pyproject.toml

  # ── Dependency audit ───────────────────────────────────────────────────────
  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit==2.8.0

      - name: Audit production dependencies
        run: pip-audit -r requirements.txt --progress-spinner off

  # ── Container image scan ───────────────────────────────────────────────────
  trivy:
    name: Container scan (trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v6

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          tags: cicd-pipeline-demo:scan
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: cicd-pipeline-demo:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
